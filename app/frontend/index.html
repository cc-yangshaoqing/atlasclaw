<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="app.title">AtlasClaw AI Assistant</title>
    <!-- Deep Chat -->
    <script type="module" src="/static/deepChat.bundle.js"></script>
    <!-- Styles -->
    <link rel="stylesheet" href="/styles/main.css?v=10">

    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/mention.css">
    <!-- App Entry (Open source: use source directly, Enterprise: change to /dist/app.min.js) -->
    <script type="module" src="/scripts/main.js?v=20260323a"></script>


</head>
<body>
    <!-- Left Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn">
                <span>+</span>
                <span data-i18n="app.newChat"></span>
            </button>
        </div>
        <div class="sidebar-content">
            <div class="chat-history-group">
                <div class="group-title" data-i18n="app.today"></div>
                <div class="history-item active" data-i18n="app.currentChat"></div>
            </div>
        </div>
        <div class="sidebar-footer">
            <a href="/channels.html" class="settings-btn">
                <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
                <span data-i18n="app.channels">Channels</span>
            </a>
            <a href="/models.html" class="settings-btn">
                <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="3" y1="9" x2="21" y2="9"></line>
                    <line x1="9" y1="21" x2="9" y2="9"></line>
                </svg>
                <span data-i18n="app.models">Models</span>
            </a>
        </div>
    </aside>
    
    <!-- Main Content -->
    <main class="main-content">
        <header class="chat-header">
            <h1 data-i18n="app.title"></h1>
            <div class="header-actions">
                <button id="logoutBtn" class="logout-btn" type="button" data-i18n-title="logout.title" data-i18n-aria-label="logout.title" title="Logout" aria-label="Logout">


                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </div>
        </header>

        
        <div class="chat-wrapper">
            <deep-chat
                id="chat"
                demo="true"
                style="width: 100%; height: 100%; display: flex;"
                chatStyle='{"backgroundColor": "#ffffff"}'
                messageStyles='{
                    "default": {
                        "shared": {
                            "bubble": {
                                "borderRadius": "12px",
                                "padding": "14px 18px",
                                "fontSize": "15px",
                                "lineHeight": "1.6",
                                "maxWidth": "720px"
                            },
                            "outerContainer": {
                                "marginTop": "16px",
                                "marginBottom": "16px"
                            }
                        },
                        "user": {
                            "bubble": {
                                "backgroundColor": "#4b6cb7",
                                "color": "#ffffff"
                            }
                        },
                        "ai": {
                            "bubble": {
                                "backgroundColor": "#f7f7f8",
                                "color": "#333333"
                            },
                            "outerContainer": {
                                "justifyContent": "center"
                            }
                        }
                    }
                }'
                inputAreaStyle='{"padding": "20px 24px", "backgroundColor": "#fafafa", "borderTop": "1px solid #e5e5e5"}'
                submitButtonStyles='{"submit": {"container": {"default": {"backgroundColor": "#4b6cb7", "borderRadius": "50%", "width": "40px", "height": "40px"}, "hover": {"backgroundColor": "#3a5a9a"}}}}'
                textMarkdown="true">
            </deep-chat>
        </div>
    </main>
    
    <!-- Confirm Dialog -->
    <div id="confirmDialog" class="confirm-dialog hidden">
        <div class="confirm-content">
            <h3 data-i18n="dialog.confirmTitle"></h3>
            <p id="confirmMessage" data-i18n="dialog.confirmMessage"></p>
            <div class="confirm-buttons">
                <button class="btn-cancel" data-i18n="dialog.cancel"></button>
                <button class="btn-confirm" data-i18n="dialog.confirm"></button>
            </div>
        </div>
    </div>
</body>
</html
