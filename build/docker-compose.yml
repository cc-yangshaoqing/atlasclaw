version: '3.8'

services:
  atlasclaw:
    image: registry.cn-shanghai.aliyuncs.com/atlasclaw/atlasclaw:latest
    container_name: atlasclaw
    ports:
      - "8000:8000"
    environment:
      - ATLASCLAW_CONFIG=/app/workspace/atlasclaw.json
    working_dir: /app/workspace
    volumes:
      # Workspace: host /opt/atlasclaw/workspace -> container /app/workspace
      - /opt/atlasclaw/workspace:/app/workspace
      # Data: host /opt/atlasclaw/data -> container /app/data
      - /opt/atlasclaw/data:/app/data
      # Extensions: host /opt/atlasclaw/extensions -> container /app/extensions
      - /opt/atlasclaw/extensions/providers:/app/extensions/providers
      - /opt/atlasclaw/extensions/skills:/app/extensions/skills
      - /opt/atlasclaw/extensions/channels:/app/extensions/channels
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
